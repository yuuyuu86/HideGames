services:
  - type: web
    name: hidegames
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
